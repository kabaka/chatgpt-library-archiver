<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' data:;">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Image Gallery</title>
<style>
:root {
  --space: 20px;
  --gap: 15px;
  --bg: #fff;
  --text: #000;
  --meta-color: #444;
  --control-bg: #ddd;
}
*, *::before, *::after {
  box-sizing: border-box;
}
body {
  font-family: sans-serif;
  margin: 0;
  background: var(--bg);
  color: var(--text);
  transition: background 0.3s, color 0.3s;
}
body.dark {
  --bg: #111;
  --text: #eee;
  --meta-color: #ccc;
  --control-bg: #555;
}
.layout {
  width: 100%;
  margin: 0;
  padding: 0 var(--space) var(--space);
}
.gallery-grid {
  display: grid;
  gap: var(--gap);
  grid-template-columns: repeat(auto-fill, minmax(var(--thumb-size, 200px), 1fr));
  grid-auto-rows: var(--thumb-size, 200px);
}
.gallery-full {
  display: flex;
  flex-direction: column;
  gap: var(--gap);
}
.gallery-small { --thumb-size: 150px; }
.gallery-medium { --thumb-size: 250px; }
.gallery-large { --thumb-size: 400px; }
.gallery-full .image-card,
.gallery-full .image-card a.thumb {
  height: auto;
}
.gallery-full .image-card img {
  width: 100%;
  height: auto;
  max-width: none;
  max-height: none;
  object-fit: contain;
  object-position: center;
}
.gallery-small .meta .created,
.gallery-small .meta .tags { display: none; }
.image-card {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  background: var(--bg);
  height: 100%;
}
.image-card a.thumb {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
}
.image-card img {
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  object-fit: contain;
  object-position: center;
  display: block;
}
.meta {
  display: none;
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  max-height: 50%;
  background: rgba(0, 0, 0, 0.6);
  color: #fff;
  font-size: 0.85em;
  padding: 6px;
  box-sizing: border-box;
  overflow: hidden;
}
.image-card:hover .meta,
.image-card:focus-within .meta { display: block; }
.meta a { color: #fff; text-decoration: underline; }
.meta .tags {
  font-size: 0.7em;
  overflow: hidden;
}
.tag-pill {
  display: inline-block;
  background: rgba(255, 255, 255, 0.2);
  padding: 1px 6px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 1em;
  margin: 1px 2px;
  border: none;
  color: #fff;
  font-family: inherit;
  line-height: 1.4;
}
.tag-pill:hover, .tag-pill:focus-visible {
  background: rgba(255, 255, 255, 0.4);
}
header.top-bar {
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 100;
  padding: 10px var(--space);
  width: 100%;
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  grid-template-areas: "title search controls";
  gap: 10px;
  align-items: center;
}
header.top-bar h1 {
  margin: 0;
  font-size: 1.2em;
  grid-area: title;
}
.controls {
  display: inline-flex;
  justify-content: flex-end;
  gap: 8px;
  margin: 0;
  grid-area: controls;
}
.toggle, .size-select, .sort-select {
  background: var(--control-bg);
  border-radius: 5px;
  padding: 6px 10px;
  cursor: pointer;
  font-size: 0.9em;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.search-bar {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}
header.top-bar .search-bar {
  grid-area: search;
  margin: 0;
}
.search-bar input {
  padding: 7px;
  font-size: 1em;
}
.search-bar input[type="text"] {
  flex: 1 1 200px;
  min-width: 140px;
  max-width: 100%;
}
.search-bar button {
  background: var(--control-bg);
  border: none;
  border-radius: 5px;
  padding: 7px;
  cursor: pointer;
}
.search-bar .help-icon {
  background: var(--control-bg);
  border-radius: 50%;
  cursor: help;
  display: inline-block;
  font-size: 0.8em;
  font-weight: bold;
  height: 20px;
  line-height: 20px;
  text-align: center;
  width: 20px;
}
.date-range {
  display: inline-flex;
  gap: 6px;
  align-items: center;
  font-size: 0.9em;
}
.date-range input {
  padding: 5px 6px;
}
.date-range span {
  white-space: nowrap;
}
.reset-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 32px;
}
.icon-link {
  display: flex;
  align-items: center;
}
.icon-link svg {
  width: 20px;
  height: 20px;
  fill: currentColor;
}
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}
.result-count {
  padding: 4px var(--space);
  font-size: 0.85em;
  color: var(--meta-color);
}
.scroll-sentinel {
  height: 1px;
  width: 100%;
}
@media (prefers-color-scheme: dark) {
  body:not(.light) {
    --bg: #111;
    --text: #eee;
    --meta-color: #ccc;
    --control-bg: #555;
  }
}
@media (max-width: 960px) {
  header.top-bar {
    padding: 8px calc(var(--space) * 0.75);
    gap: 8px;
  }
  header.top-bar h1 {
    font-size: 1.1em;
  }
  .toggle, .size-select, .sort-select, .search-bar button {
    padding: 6px 8px;
    font-size: 0.9em;
  }
  .controls {
    gap: 6px;
  }
}
@media (max-width: 680px) {
  header.top-bar {
    grid-template-columns: minmax(0, 1fr);
    grid-template-areas:
      "search"
      "controls";
    align-items: stretch;
  }
  header.top-bar h1 {
    display: none;
  }
  .controls {
    display: flex;
    justify-content: flex-start;
    gap: 8px;
    width: 100%;
    flex-wrap: wrap;
  }
  header.top-bar .search-bar {
    width: 100%;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    grid-template-areas:
      "query help"
      "dates dates";
    column-gap: 8px;
    row-gap: 10px;
  }
  .search-bar input[type="text"] {
    grid-area: query;
    min-width: 0;
  }
  .search-bar .help-icon {
    grid-area: help;
    justify-self: end;
    align-self: center;
  }
  .date-range {
    grid-area: dates;
    width: 100%;
    display: grid;
    grid-template-columns: auto minmax(0, 1fr) minmax(0, 1fr) auto;
    column-gap: 6px;
    align-items: center;
  }
  .date-range input {
    min-width: 0;
  }
  .toggle, .size-select, .sort-select {
    font-size: 0.95em;
  }
  .reset-button {
    justify-self: end;
    padding: 7px 8px;
    font-size: 0.95em;
  }
  .controls .toggle,
  .controls .icon-link {
    display: none;
  }
}
#viewer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.8);
  display: none;
  align-items: center;
  justify-content: center;
}
#viewer img {
  max-width: 90%;
  max-height: 90%;
  width: auto;
  height: auto;
}
#viewer .viewer-meta { position: absolute; bottom: 20px; }
#viewer a {
  color: white;
  background: rgba(0, 0, 0, 0.6);
  padding: 4px 8px;
  border-radius: 4px;
}
#viewer .viewer-close {
  position: absolute;
  top: 15px;
  right: 15px;
  background: rgba(0, 0, 0, 0.6);
  color: white;
  border: none;
  font-size: 1.5em;
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 4px;
  z-index: 1;
}
.skip-link {
  position: absolute;
  left: -9999px;
  top: auto;
  width: 1px;
  height: 1px;
  overflow: hidden;
  z-index: 1000;
}
.skip-link:focus {
  position: fixed;
  top: 10px;
  left: 10px;
  width: auto;
  height: auto;
  padding: 8px 16px;
  background: var(--control-bg);
  color: var(--text);
  border-radius: 4px;
  font-size: 1em;
  text-decoration: none;
  outline: 2px solid #4A90D9;
  outline-offset: 2px;
}
a:focus-visible,
button:focus-visible,
input:focus-visible,
select:focus-visible,
.thumb:focus-visible,
.help-icon:focus-visible,
.tag-pill:focus-visible {
  outline: 2px solid #4A90D9;
  outline-offset: 2px;
}
button.toggle {
  border: none;
  color: inherit;
  font-family: inherit;
}
</style>
</head>
<body>
  <a class="skip-link" href="#gallery">Skip to content</a>
  <noscript><p style="padding: 20px; text-align: center;">JavaScript is required to view this gallery. Please enable JavaScript in your browser settings.</p></noscript>
  <header class="top-bar">
      <h1>Image Gallery</h1>
      <div class="search-bar">
        <input
          type="text"
          id="searchBox"
          placeholder="Search images"
          aria-describedby="searchHelp"
        >
        <span
          id="searchHelp"
          class="help-icon"
          tabindex="0"
          role="button"
          aria-label="Search help: Use AND, OR, NOT, and parentheses to refine search"
          title="Use AND, OR, NOT, and parentheses to refine search."
        >?</span>
        <div class="date-range">
          <span>Date range:</span>
          <input type="date" id="startDate" aria-label="Start date">
          <input type="date" id="endDate" aria-label="End date">
          <button type="button" id="resetFilters" class="reset-button" title="Reset filters">⟲<span class="sr-only">Reset filters</span></button>
        </div>
      </div>
      <nav class="controls" aria-label="Gallery controls">
        <div class="sort-select">
          <label for="sortSelector">Sort:</label>
          <select id="sortSelector">
            <option value="date-desc">Date (newest)</option>
            <option value="date-asc">Date (oldest)</option>
            <option value="title-asc">Title (A–Z)</option>
            <option value="title-desc">Title (Z–A)</option>
          </select>
        </div>
        <div class="size-select">
          <label for="sizeSelector">Size:</label>
          <select id="sizeSelector">
            <option value="gallery-small">Small</option>
            <option value="gallery-medium" selected>Medium</option>
            <option value="gallery-large">Large</option>
            <option value="gallery-full">Full size</option>
          </select>
        </div>
        <button class="toggle" type="button">Toggle Dark Mode</button>
        <a class="icon-link" href="https://github.com/kabaka/chatgpt-library-archiver" target="_blank" rel="noopener" title="GitHub project">
          <svg role="img" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.387.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.758-1.333-1.758-1.09-.744.083-.729.083-.729 1.205.084 1.84 1.236 1.84 1.236 1.07 1.835 2.807 1.305 3.492.998.108-.776.418-1.305.762-1.605-2.665-.305-5.466-1.332-5.466-5.93 0-1.31.467-2.381 1.235-3.221-.124-.303-.535-1.523.117-3.176 0 0 1.008-.322 3.3 1.23a11.52 11.52 0 0 1 3-.405c1.02.005 2.045.138 3 .405 2.29-1.552 3.296-1.23 3.296-1.23.653 1.653.242 2.873.118 3.176.77.84 1.233 1.911 1.233 3.221 0 4.61-2.807 5.624-5.479 5.921.43.37.823 1.102.823 2.222 0 1.606-.014 2.898-.014 3.293 0 .319.218.694.825.576C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
          <span class="sr-only">GitHub project</span>
        </a>
      </nav>
  </header>
  <div class="result-count" id="resultCount" aria-live="polite"></div>
  <main class="layout">
    <div class="gallery gallery-grid gallery-medium" id="gallery"></div>
    <div class="scroll-sentinel" id="scrollSentinel" aria-hidden="true"></div>
  </main>
<div id="viewer" role="dialog" aria-modal="true" aria-label="Image viewer" tabindex="-1">
  <button id="viewerClose" class="viewer-close" type="button" aria-label="Close viewer">&times;</button>
  <img id="viewerImg" src="" alt="">
  <div class="viewer-meta"><a id="viewerRaw" href="" target="_blank">Raw file</a></div>
</div>
<script>
/* === Constants === */
const INITIAL_BATCH = 100;
const SCROLL_BATCH = 50;
const sizeClassToKey = {
  'gallery-small': 'small',
  'gallery-medium': 'medium',
  'gallery-large': 'large',
  'gallery-full': 'full',
};

/* === State === */
let allItems = [];
let filteredItems = [];
let renderedCount = 0;
let viewerData = [];
let visibleIndices = [];
let currentIndex = 0;
let justSwiped = false;
let touchStartX = 0;
let touchStartY = 0;
let viewerTrigger = null;

/* === Utilities === */
function debounce(fn, delay) {
  let timer;
  return function() {
    const args = arguments;
    const ctx = this;
    clearTimeout(timer);
    timer = setTimeout(function() { fn.apply(ctx, args); }, delay);
  };
}

function currentSizeKey() {
  const selector = document.getElementById('sizeSelector');
  const className = selector ? selector.value : 'gallery-medium';
  return sizeClassToKey[className] || 'medium';
}

function resolveThumbnails(item, fallback, fullSrc) {
  const thumbs = item.thumbnails || {};
  return {
    small: thumbs.small || fallback,
    medium: thumbs.medium || fallback,
    large: thumbs.large || fallback,
    full: thumbs.full || fullSrc,
  };
}

function safeHref(url) {
  if (!url || url === '#') return '#';
  if (/^\s*(javascript|data|vbscript)\s*:/i.test(url)) return '#';
  return url;
}

/* === Search / Filter === */
function tokenize(expr) {
  const tokens = [];
  const re = /\s*(\(|\)|AND|OR|NOT|[^()\s]+)\s*/gi;
  let m;
  while ((m = re.exec(expr)) !== null) {
    tokens.push(m[1].toLowerCase());
  }
  return tokens;
}

function makeSearchFn(expr) {
  const tokens = tokenize(expr);
  let i = 0;
  function parseExpr() {
    let node = parseTerm();
    while (tokens[i] === 'or') {
      i++;
      const rhs = parseTerm();
      const lhs = node;
      node = function(item) { return lhs(item) || rhs(item); };
    }
    return node;
  }
  function parseTerm() {
    let node = parseFactor();
    while (tokens[i] === 'and') {
      i++;
      const rhs = parseFactor();
      const lhs = node;
      node = function(item) { return lhs(item) && rhs(item); };
    }
    return node;
  }
  function parseFactor() {
    const token = tokens[i++];
    if (token === 'not') {
      const fn = parseFactor();
      return function(item) { return !fn(item); };
    }
    if (token === '(') {
      const fn = parseExpr();
      if (tokens[i] === ')') i++;
      return fn;
    }
    if (token && token !== ')' && token !== 'and' && token !== 'or') {
      return function(item) {
        return (item._searchTitle && item._searchTitle.includes(token)) ||
               (item._searchTags && item._searchTags.includes(token));
      };
    }
    return function() { return true; };
  }
  return parseExpr();
}

/* === Sorting === */
function sortItems(items, sortKey) {
  var sorted = items.slice();
  switch (sortKey) {
    case 'date-desc':
      sorted.sort(function(a, b) { return (b.created_at || 0) - (a.created_at || 0); });
      break;
    case 'date-asc':
      sorted.sort(function(a, b) { return (a.created_at || 0) - (b.created_at || 0); });
      break;
    case 'title-asc':
      sorted.sort(function(a, b) { return (a.title || '').localeCompare(b.title || ''); });
      break;
    case 'title-desc':
      sorted.sort(function(a, b) { return (b.title || '').localeCompare(a.title || ''); });
      break;
  }
  return sorted;
}

/* === Lazy Loading Observer === */
const lazyObserver = new IntersectionObserver(function(entries, obs) {
  entries.forEach(function(entry) {
    if (entry.isIntersecting) {
      var img = entry.target;
      img.src = img.dataset.src;
      obs.unobserve(img);
    }
  });
}, { rootMargin: '200px 0px' });

/* === Infinite Scroll Sentinel Observer === */
const scrollObserver = new IntersectionObserver(function(entries) {
  entries.forEach(function(entry) {
    if (entry.isIntersecting && renderedCount < filteredItems.length) {
      renderBatch(SCROLL_BATCH);
    }
  });
}, { rootMargin: '400px 0px' });

/* === Card Creation (11.4 uses <article>, 11.7 clickable tags) === */
function createCard(item, filteredIndex) {
  var card = document.createElement('article');
  card.className = 'image-card';
  var title = item.title || '';
  var imgPath = 'images/' + item.filename;
  var fallbackThumb = item.thumbnail || imgPath;
  var thumbPaths = resolveThumbnails(item, fallbackThumb, imgPath);
  var thumbKey = currentSizeKey();
  var thumbPath = thumbPaths[thumbKey];
  var tagsArr = item.tags || [];
  var created = item.created_at
    ? new Date(item.created_at * 1000)
        .toISOString()
        .replace('T', ' ')
        .split('.')[0]
    : '';
  // Build link and image
  var link = document.createElement('a');
  link.href = imgPath;
  link.className = 'thumb';
  var img = document.createElement('img');
  img.setAttribute('data-src', thumbPath);
  img.setAttribute('data-thumb-small', thumbPaths.small);
  img.setAttribute('data-thumb-medium', thumbPaths.medium);
  img.setAttribute('data-thumb-large', thumbPaths.large);
  img.setAttribute('data-thumb-full', thumbPaths.full);
  img.setAttribute('data-full', imgPath);
  img.alt = title || item.filename || item.id;
  img.loading = 'lazy';
  link.appendChild(img);
  card.appendChild(link);
  // Build metadata overlay
  var meta = document.createElement('div');
  meta.className = 'meta';
  var strong = document.createElement('strong');
  strong.textContent = title || item.id;
  meta.appendChild(strong);
  var createdSpan = document.createElement('span');
  createdSpan.className = 'created';
  createdSpan.appendChild(document.createElement('br'));
  createdSpan.appendChild(document.createTextNode(created));
  meta.appendChild(createdSpan);
  // Clickable tag pills (11.7)
  if (tagsArr.length > 0) {
    var tagsSpan = document.createElement('span');
    tagsSpan.className = 'tags';
    tagsSpan.appendChild(document.createElement('br'));
    var displayTags = tagsArr.slice(0, 5);
    for (var ti = 0; ti < displayTags.length; ti++) {
      (function(tag) {
        var pill = document.createElement('button');
        pill.type = 'button';
        pill.className = 'tag-pill';
        pill.textContent = tag;
        pill.title = 'Filter by: ' + tag;
        pill.addEventListener('click', function(e) {
          e.stopPropagation();
          e.preventDefault();
          document.getElementById('searchBox').value = tag;
          applyFiltersAndSort();
        });
        tagsSpan.appendChild(pill);
      })(displayTags[ti]);
    }
    if (tagsArr.length > 5) {
      tagsSpan.appendChild(document.createTextNode(' \u2026'));
    }
    tagsSpan.title = tagsArr.join(', ');
    meta.appendChild(tagsSpan);
  }
  meta.appendChild(document.createElement('br'));
  var convLink = document.createElement('a');
  convLink.href = safeHref(item.conversation_link);
  convLink.target = '_blank';
  convLink.textContent = 'View conversation';
  meta.appendChild(convLink);
  card.appendChild(meta);
  card.dataset.index = String(filteredIndex);
  link.addEventListener('click', function(e) {
    if (e.ctrlKey || e.metaKey) return;
    e.preventDefault();
    openViewer(filteredIndex);
  });
  return { card: card, img: img };
}

/* === Batch Rendering (11.1 infinite scroll + 11.3 DocumentFragment) === */
function renderBatch(count) {
  var gallery = document.getElementById('gallery');
  var start = renderedCount;
  var end = Math.min(start + count, filteredItems.length);
  if (start >= end) return;
  var fragment = document.createDocumentFragment();
  for (var i = start; i < end; i++) {
    var result = createCard(filteredItems[i], i);
    fragment.appendChild(result.card);
    lazyObserver.observe(result.img);
  }
  gallery.appendChild(fragment);
  renderedCount = end;
}

function resetRender() {
  var gallery = document.getElementById('gallery');
  gallery.innerHTML = '';
  renderedCount = 0;
}

/* === Viewer Data Rebuild === */
function rebuildViewerData() {
  var thumbKey = currentSizeKey();
  viewerData = [];
  visibleIndices = [];
  for (var i = 0; i < filteredItems.length; i++) {
    var item = filteredItems[i];
    var imgPath = 'images/' + item.filename;
    var fallbackThumb = item.thumbnail || imgPath;
    var thumbPaths = resolveThumbnails(item, fallbackThumb, imgPath);
    viewerData.push({
      src: imgPath,
      thumb: thumbPaths[thumbKey],
      thumbs: thumbPaths,
      title: item.title || item.id,
    });
    visibleIndices.push(i);
  }
}

/* === Result Count (11.6) === */
function updateResultCount() {
  var el = document.getElementById('resultCount');
  var total = allItems.length;
  var shown = filteredItems.length;
  if (total === 0) {
    el.textContent = '';
  } else if (shown === total) {
    el.textContent = 'Showing all ' + total + ' images';
  } else {
    el.textContent = 'Showing ' + shown + ' of ' + total + ' images';
  }
}

/* === Filter + Sort + Render Pipeline === */
function applyFiltersAndSort() {
  var textEl = document.getElementById('searchBox');
  var startEl = document.getElementById('startDate');
  var endEl = document.getElementById('endDate');
  var sortEl = document.getElementById('sortSelector');
  var text = textEl.value.toLowerCase();
  var start = startEl.value;
  var end = endEl.value;
  var sortKey = sortEl.value;
  // Persist filter state
  try {
    sessionStorage.setItem('filter-text', textEl.value);
    sessionStorage.setItem('filter-start', start);
    sessionStorage.setItem('filter-end', end);
    sessionStorage.setItem('sort', sortKey);
  } catch (e) { /* private browsing */ }
  var startMs = start ? new Date(start).getTime() : null;
  var endMs = end ? new Date(end).getTime() : null;
  var searchFn = text ? makeSearchFn(text) : function() { return true; };
  // Filter data
  filteredItems = [];
  for (var i = 0; i < allItems.length; i++) {
    var item = allItems[i];
    var created = item.created_at ? item.created_at * 1000 : null;
    if (!searchFn(item)) continue;
    if (startMs !== null && (!created || created < startMs)) continue;
    if (endMs !== null && (!created || created > endMs)) continue;
    filteredItems.push(item);
  }
  // Sort (11.5)
  filteredItems = sortItems(filteredItems, sortKey);
  // Rebuild viewer data for lightbox
  rebuildViewerData();
  // Re-render with infinite scroll
  resetRender();
  renderBatch(INITIAL_BATCH);
  updateResultCount();
}

/* === Metadata Loading === */
async function loadImages() {
  var response = await fetch('metadata.json', { cache: 'no-store' });
  if (!response.ok) throw new Error('Failed to load metadata: ' + response.status);
  var data = await response.json();
  // Pre-compute search fields on each item
  allItems = [];
  for (var i = 0; i < data.length; i++) {
    var item = data[i];
    item._searchTitle = (item.title || '').toLowerCase();
    item._searchTags = (item.tags || []).map(function(t) { return t.toLowerCase(); }).join('\n');
    allItems.push(item);
  }
  // Start observing the infinite scroll sentinel
  var sentinel = document.getElementById('scrollSentinel');
  scrollObserver.observe(sentinel);
  // Apply initial filters and render first batch
  applyFiltersAndSort();
}

/* === Dark Mode === */
function toggleDarkMode() {
  var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  var isDark =
    document.body.classList.contains('dark') ||
    (!document.body.classList.contains('light') && prefersDark);
  if (isDark) {
    document.body.classList.remove('dark');
    document.body.classList.add('light');
    try { sessionStorage.setItem('theme', 'light'); } catch (e) {}
  } else {
    document.body.classList.remove('light');
    document.body.classList.add('dark');
    try { sessionStorage.setItem('theme', 'dark'); } catch (e) {}
  }
}

/* === Thumbnail Size Change === */
function updateThumbnailsForSize(sizeKey) {
  var images = document.querySelectorAll('.image-card img');
  images.forEach(function(img) {
    var nextSrc = img.dataset['thumb' + sizeKey.charAt(0).toUpperCase() + sizeKey.slice(1)];
    if (!nextSrc) nextSrc = img.dataset.src;
    if (!nextSrc) return;
    img.dataset.src = nextSrc;
    if (img.hasAttribute('src')) {
      img.src = nextSrc;
    }
  });
  for (var i = 0; i < viewerData.length; i++) {
    if (viewerData[i].thumbs) {
      viewerData[i].thumb = viewerData[i].thumbs[sizeKey] || viewerData[i].thumb;
    }
  }
}

function changeSize() {
  var gallery = document.getElementById('gallery');
  var size = document.getElementById('sizeSelector').value;
  if (size === 'gallery-full') {
    gallery.className = 'gallery gallery-full';
  } else {
    gallery.className = 'gallery gallery-grid ' + size;
  }
  try { sessionStorage.setItem('size', size); } catch (e) {}
  var sizeKey = sizeClassToKey[size] || 'medium';
  updateThumbnailsForSize(sizeKey);
}

/* === Reset Filters === */
function resetFilters() {
  document.getElementById('searchBox').value = '';
  document.getElementById('startDate').value = '';
  document.getElementById('endDate').value = '';
  document.getElementById('sortSelector').value = 'date-desc';
  try {
    sessionStorage.removeItem('filter-text');
    sessionStorage.removeItem('filter-start');
    sessionStorage.removeItem('filter-end');
    sessionStorage.removeItem('sort');
  } catch (e) {}
  applyFiltersAndSort();
}

/* === Viewer === */
function showViewerAt(pos) {
  currentIndex = pos;
  var index = visibleIndices[pos];
  var item = viewerData[index];
  var viewer = document.getElementById('viewer');
  var img = document.getElementById('viewerImg');
  var raw = document.getElementById('viewerRaw');
  viewer.style.display = 'flex';
  img.src = item.src;
  img.alt = item.title;
  raw.href = item.src;
  viewer.focus();
}

function openViewer(index) {
  var card = document.querySelector('.image-card[data-index="' + index + '"] a.thumb');
  viewerTrigger = card || document.activeElement;
  var pos = visibleIndices.indexOf(index);
  if (pos === -1) return;
  showViewerAt(pos);
}

function closeViewer() {
  document.getElementById('viewer').style.display = 'none';
  justSwiped = false;
  if (viewerTrigger) {
    viewerTrigger.focus();
    viewerTrigger = null;
  }
}

function showNext(delta) {
  var total = visibleIndices.length;
  if (!total) return;
  var nextPos = (currentIndex + delta + total) % total;
  showViewerAt(nextPos);
}

/* === Initialization === */
// Restore saved preferences
try {
  var savedTheme = sessionStorage.getItem('theme');
  if (savedTheme === 'dark') document.body.classList.add('dark');
  else if (savedTheme === 'light') document.body.classList.add('light');
  var savedSize = sessionStorage.getItem('size');
  if (savedSize) {
    document.getElementById('sizeSelector').value = savedSize;
    var gallery = document.getElementById('gallery');
    gallery.className = savedSize === 'gallery-full'
      ? 'gallery gallery-full'
      : 'gallery gallery-grid ' + savedSize;
  }
  var savedSort = sessionStorage.getItem('sort');
  if (savedSort) document.getElementById('sortSelector').value = savedSort;
  document.getElementById('searchBox').value = sessionStorage.getItem('filter-text') || '';
  document.getElementById('startDate').value = sessionStorage.getItem('filter-start') || '';
  document.getElementById('endDate').value = sessionStorage.getItem('filter-end') || '';
} catch (e) {}

// Debounced search handler (11.2 — 200ms debounce on text input only)
var debouncedFilter = debounce(applyFiltersAndSort, 200);

/* === Event Listeners === */
document.getElementById('searchBox').addEventListener('input', debouncedFilter);
document.getElementById('startDate').addEventListener('change', applyFiltersAndSort);
document.getElementById('endDate').addEventListener('change', applyFiltersAndSort);
document.getElementById('resetFilters').addEventListener('click', resetFilters);
document.getElementById('sizeSelector').addEventListener('change', changeSize);
document.getElementById('sortSelector').addEventListener('change', applyFiltersAndSort);
document.querySelector('button.toggle').addEventListener('click', toggleDarkMode);
document.getElementById('searchHelp').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    e.target.click();
  }
});
document.getElementById('viewerClose').addEventListener('click', closeViewer);

// Keyboard navigation
document.addEventListener('keydown', function(e) {
  var viewer = document.getElementById('viewer');
  if (viewer.style.display !== 'flex') return;
  if (e.key === 'Escape') {
    closeViewer();
  } else if (e.key === 'ArrowRight') {
    showNext(1);
  } else if (e.key === 'ArrowLeft') {
    showNext(-1);
  } else if (e.key === 'Tab') {
    var focusable = viewer.querySelectorAll('button, a[href]');
    if (focusable.length === 0) return;
    var first = focusable[0];
    var last = focusable[focusable.length - 1];
    if (e.shiftKey) {
      if (document.activeElement === first || document.activeElement === viewer) {
        e.preventDefault();
        last.focus();
      }
    } else {
      if (document.activeElement === last || document.activeElement === viewer) {
        e.preventDefault();
        first.focus();
      }
    }
  }
});

// Viewer click/touch handlers
var viewerEl = document.getElementById('viewer');
viewerEl.addEventListener('click', function(e) {
  if (justSwiped) { justSwiped = false; return; }
  if (e.target.closest('#viewer .viewer-meta a')) return;
  e.preventDefault();
  e.stopPropagation();
  closeViewer();
});
viewerEl.addEventListener('touchstart', function(e) {
  if (e.touches.length !== 1) return;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  justSwiped = false;
});
viewerEl.addEventListener('touchend', function(e) {
  if (e.changedTouches.length !== 1) return;
  var touch = e.changedTouches[0];
  var dx = touch.clientX - touchStartX;
  var dy = touch.clientY - touchStartY;
  var absDx = Math.abs(dx);
  var absDy = Math.abs(dy);
  if (absDx > 50 && absDx > absDy) {
    showNext(dx < 0 ? 1 : -1);
    justSwiped = true;
  } else if (!e.target.closest('#viewer .viewer-meta a')) {
    closeViewer();
  }
  if (!e.target.closest('#viewer .viewer-meta a')) e.preventDefault();
}, { passive: false });

// Load gallery
loadImages().catch(function(err) {
  console.error('Failed to load gallery metadata:', err);
  var gallery = document.getElementById('gallery');
  gallery.innerHTML = '<p style="padding:20px;text-align:center;color:var(--text);">Unable to load gallery. Make sure <strong>metadata.json</strong> is available and the gallery is served over HTTP.</p>';
});
</script>
</body></html>
